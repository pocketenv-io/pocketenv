name: Test Sandbox

on:
  push:
    paths:
      - "apps/sandbox/**"
      - ".github/workflows/test-sandbox.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2

      - name: Run tests
        working-directory: apps/sandbox
        run: deno task test
