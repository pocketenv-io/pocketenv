name: Publish
on:
  push:
    branches:
      - main
    paths:
      - "modal/**"
      - ".github/workflows/publish-modal.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sandbox:
          [
            amp,
            claude,
            codex,
            copilot,
            crush,
            cursor,
            gemini,
            mise,
            kilo,
            kiro,
            nix,
            nullclaw,
            pkgx,
            openclaw,
            opencode,
            opencrust,
            picoclaw,
            zeroclaw,
          ]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/pocketenv-io/modal-${{ matrix.sandbox }}
          tags: |
            type=raw,value=0.1.0

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: modal/${{ matrix.sandbox }}
          file: modal/${{ matrix.sandbox }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.sandbox }}
          cache-to: type=gha,mode=max,scope=${{ matrix.sandbox }}
